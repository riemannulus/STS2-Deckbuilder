services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - sts2-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/graphql?query=%7B__typename%7D"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  sts2-data:
